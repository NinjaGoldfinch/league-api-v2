services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: league_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d league_api"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://league_api:league_api@postgres:5432/league_api
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    environment:
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      OPERATOR_API_TOKEN: ${OPERATOR_API_TOKEN:-}
      OPERATOR_MUTATION_REQUESTS: ${OPERATOR_MUTATION_REQUESTS:-30}
      OPERATOR_MUTATION_WINDOW_SECONDS: ${OPERATOR_MUTATION_WINDOW_SECONDS:-60}
      EXPERIMENTAL_FRONTEND_ENABLED: ${EXPERIMENTAL_FRONTEND_ENABLED:-false}
      DATABASE_URL: postgresql+asyncpg://league_api:league_api@postgres:5432/league_api
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
